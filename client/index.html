<!DOCTYPE html>
<html lang="it">
  <head>
    <!-- WebPro Italia - Siti Web Professionali -->
    <!-- Developed with modern web technologies: HTML5, CSS3, JavaScript ES6+ -->
    <!-- Framework: React.js with TypeScript for component-based architecture -->
    <!-- Styling: Tailwind CSS for responsive design and custom animations -->
    <!-- Backend: Node.js with Express.js for API endpoints -->
    <!-- Database: PostgreSQL for data persistence -->
    
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Sito Web Professionale a Soli €197 | Offerta Speciale</title>
    <meta name="description" content="Ottieni il tuo sito web professionale a soli €197 invece di €1200. Design responsive e consegna in 5 giorni!" />
    <meta property="og:title" content="Sito Web Professionale a Soli €197 | Offerta Speciale" />
    <meta property="og:description" content="Ottieni il tuo sito web professionale a soli €197 invece di €1200. Design responsive e consegna in 5 giorni!" />
    <meta property="og:type" content="website" />
    
    <!-- Google Fonts - Performance optimized with preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
    <!-- Meta Pixel Code - Caricato dinamicamente dal database -->
    <script id="meta-pixel-script">
      function initMetaPixel(pixelId) {
        if (!pixelId || window.fbq) return; // Evita inizializzazioni multiple
        
        !function(f,b,e,v,n,t,s)
        {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
        n.callMethod.apply(n,arguments):n.queue.push(arguments)};
        if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
        n.queue=[];t=b.createElement(e);t.async=!0;
        t.src=v;s=b.getElementsByTagName(e)[0];
        s.parentNode.insertBefore(t,s)}(window, document,'script',
        'https://connect.facebook.net/en_US/fbevents.js');
        
        fbq('init', pixelId);
        fbq('track', 'PageView');
        
        console.log('Meta Pixel inizializzato:', pixelId);
      }
      
      function loadTrackingCodes() {
        fetch('/api/site-settings')
          .then(res => res.json())
          .then(data => {
            console.log('Impostazioni caricate:', data);
            
            // Inizializza Meta Pixel
            if (data && data.metaPixelId && data.metaPixelId.trim()) {
              initMetaPixel(data.metaPixelId.trim());
            }
            
            // Inserisce altri codici di tracciamento
            if (data && data.otherTracking && data.otherTracking.trim()) {
              const head = document.head;
              const scriptContainer = document.createElement('div');
              scriptContainer.innerHTML = data.otherTracking.trim();
              
              // Sposta gli script nel head per eseguirli
              Array.from(scriptContainer.children).forEach(element => {
                if (element.tagName === 'SCRIPT') {
                  const newScript = document.createElement('script');
                  if (element.src) {
                    newScript.src = element.src;
                    newScript.async = true;
                  } else {
                    newScript.innerHTML = element.innerHTML;
                  }
                  head.appendChild(newScript);
                } else {
                  head.appendChild(element);
                }
              });
              
              console.log('Altri codici di tracciamento caricati');
            }
          })
          .catch(err => console.error('Errore nel caricamento delle impostazioni:', err));
      }
      
      // Carica i codici quando il DOM è pronto
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', loadTrackingCodes);
      } else {
        loadTrackingCodes();
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

  </body>
</html>
