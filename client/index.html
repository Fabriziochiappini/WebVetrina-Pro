    <!-- Meta Pixel Code - Caricato dinamicamente dal database -->
    <script id="meta-pixel-script">
      function initMetaPixel(pixelId) {
        if (!pixelId || window.fbq) return; // Evita inizializzazioni multiple
        
        !function(f,b,e,v,n,t,s)
        {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
        n.callMethod.apply(n,arguments):n.queue.push(arguments)};
        if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
        n.queue=[];t=b.createElement(e);t.async=!0;
        t.src=v;s=b.getElementsByTagName(e)[0];
        s.parentNode.insertBefore(t,s)}(window, document,'script',
        'https://connect.facebook.net/en_US/fbevents.js');
        
        fbq('init', pixelId);
        fbq('track', 'PageView');
        
        console.log('Meta Pixel inizializzato:', pixelId);
      }
      
      function loadTrackingCodes() {
        fetch('/api/site-settings')
          .then(res => res.json())
          .then(data => {
            console.log('Impostazioni caricate:', data);
            
            // Inizializza Meta Pixel
            if (data && data.metaPixelId && data.metaPixelId.trim()) {
              initMetaPixel(data.metaPixelId.trim());
            }
            
            // Inserisce altri codici di tracciamento
            if (data && data.otherTracking && data.otherTracking.trim()) {
              const head = document.head;
              const scriptContainer = document.createElement('div');
              scriptContainer.innerHTML = data.otherTracking.trim();
              
              // Sposta gli script nel head per eseguirli
              Array.from(scriptContainer.children).forEach(element => {
                if (element.tagName === 'SCRIPT') {
                  const newScript = document.createElement('script');
                  if (element.src) {
                    newScript.src = element.src;
                    newScript.async = true;
                  } else {
                    newScript.innerHTML = element.innerHTML;
                  }
                  head.appendChild(newScript);
                } else {
                  head.appendChild(element);
                }
              });
              
              console.log('Altri codici di tracciamento caricati');
            }
          })
          .catch(err => console.error('Errore nel caricamento delle impostazioni:', err));
      }
      
      // Carica i codici quando il DOM è pronto
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', loadTrackingCodes);
      } else {
        loadTrackingCodes();
      }
    </script>
