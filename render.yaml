services:
  - type: web
    name: webvetrina-pro
    env: node
    plan: free
    buildCommand: cd client && npx vite build --outDir ../dist/public --emptyOutDir && cd .. && npx esbuild server/index.ts --platform=node --packages=external --bundle --format=esm --outdir=dist
    startCommand: NODE_ENV=production node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: webvetrina-db
          property: connectionString

databases:
  - name: webvetrina-db
    databaseName: webvetrina
    user: webvetrina